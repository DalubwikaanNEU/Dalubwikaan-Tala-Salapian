<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dalubwikaan Monthly Report</title>


<link rel="stylesheet" href="style.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


</head>


<body>


<header class="adminHeader">

<h1>
📊 Dalubwikaan Monthly Report
</h1>


<p>
Financial Summary and Transparency Report
</p>


</header>







<main class="adminContainer">





<section class="dashboard">



<div class="card">

<h3>
Total Collection
</h3>


<h2 id="reportCollection">
₱0
</h2>


</div>






<div class="card">

<h3>
Total Expenses
</h3>


<h2 id="reportExpense">
₱0
</h2>


</div>






<div class="card">

<h3>
Balance
</h3>


<h2 id="reportBalance">
₱0
</h2>


</div>



</section>









<section class="adminCard">


<h2>
📅 Select Month
</h2>



<select id="monthFilter">


<option value="0">
January
</option>


<option value="1">
February
</option>


<option value="2">
March
</option>


<option value="3">
April
</option>


<option value="4">
May
</option>


<option value="5">
June
</option>


<option value="6">
July
</option>


<option value="7">
August
</option>


<option value="8">
September
</option>


<option value="9">
October
</option>


<option value="10">
November
</option>


<option value="11">
December
</option>


</select>



<br><br>



<button id="printButton">

🖨️ Print Monthly Report

</button>



</section>








<!-- REPORT INFORMATION -->


<section class="adminCard">


<h2>
📄 Report Information
</h2>



<p id="reportMonth">

📅 Month:

</p>



<p id="generatedDate">

Generated:

</p>



</section>







</main>







<script type="module" src="reports.js"></script>



</body>

</html>
