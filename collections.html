<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Dalubwikaan Collections</title>


<link rel="stylesheet" href="style.css">


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


</head>



<body>




<header class="adminHeader">


<h1>
💰 Dalubwikaan Collections
</h1>


<p>
Collection Records and Financial Transparency
</p>


</header>








<main class="adminContainer">







<!-- TOTAL COLLECTION -->


<section class="dashboard">


<div class="card">


<h3>
Total Collection
</h3>


<h2 id="totalCollection">

₱0

</h2>


</div>





<div class="card">


<h3>
Filter Year Level
</h3>


<select id="yearFilter">


<option value="all">
All Years
</option>



<option value="1">
1st Year
</option>



<option value="2">
2nd Year
</option>



<option value="3">
3rd Year
</option>



<option value="4">
4th Year
</option>



</select>



</div>


</section>









<!-- COLLECTION LIST -->


<section class="adminCard">


<h2>
📋 Collection Records
</h2>



<div id="collectionList">


Loading collections...


</div>



</section>








</main>







<script type="module" src="collections.js"></script>

</html>
