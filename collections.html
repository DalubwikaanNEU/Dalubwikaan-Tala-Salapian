<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dalubwikaan • Collections</title>

    <link rel="stylesheet" href="style.css">

    <script type="module" src="collections.js" defer></script>
</head>
<body>

<header>
    <h1>📚 Dalubwikaan Transparency Portal</h1>

    <nav>
        <a href="index.html">Dashboard</a>
        <a href="collections.html" class="active">Collections</a>
        <a href="expenses.html">Expenses</a>
        <a href="projects.html">Projects</a>
        <a href="announcements.html">Announcements</a>
        <a href="login.html">Admin</a>
    </nav>
</header>

<main class="container">

    <div class="card">
        <h2>Collection Summary</h2>

        <div class="summary-grid">

            <div class="summary-card">
                <h3>Total Collection</h3>
                <p id="totalCollection">₱0</p>
            </div>

            <div class="summary-card">
                <h3>Total Records</h3>
                <p id="collectionCount">0</p>
            </div>

        </div>
    </div>

    <div class="card">

        <h2>Search Collections</h2>

        <input
            type="text"
            id="searchCollection"
            placeholder="Search by week or collector..."
        >

        <br><br>

        <select id="yearFilter">

            <option value="all">All Year Levels</option>

            <option value="1">1st Year</option>

            <option value="2">2nd Year</option>

            <option value="3">3rd Year</option>

            <option value="4">4th Year</option>

        </select>

    </div>

    <div class="card">

        <h2>Collection Records</h2>

        <div id="collectionList">

            <p>Loading collections...</p>

        </div>

    </div>

</main>

</body>
</html>
